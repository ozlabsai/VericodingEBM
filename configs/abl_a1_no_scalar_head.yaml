# Ablation A1: drop the scalar attention-pool head (revert to LSE aggregator).
#
# This is the single most important ablation — it tests whether the AUROC fix
# in run #10 was specifically from the scalar head (vs. the other three
# changes). Expected outcome: AUROC drops back to ~0.40-0.50 (run-#9 inversion
# returns), per-line top-k stays similar.
#
# Only knob change vs run10_hybrid.yaml:
#   loss_mode: "hybrid" → "contrastive"  (this disables scalar_head=True in train.py)
#   + use legacy lambdas to keep within-spec InfoNCE active
#
# Training: 2 epochs (~1844 steps, fits the 500/1000/1500 eval cadence).

model:
  backbone: "Qwen/Qwen2.5-Coder-1.5B"
  sentinel_token: "<|fim_pad|>"
  lora:
    rank: 16
    alpha: 32
    dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
    embed_lora_rank: 8
  head:
    hidden_dim: 256
    dropout: 0.1
    init_std: 0.02
  lse:
    temp_start: 1.0
    temp_end: 0.3

data:
  system_trajectory_path: "data/raw/system_trajectory_843.jsonl"
  sft_safe_path: "data/raw/sft_safe_25k.json"
  extra_trajectory_paths:
    - "data/raw/algorithmic_trajectory_9040.jsonl"
  extra_sft_paths:
    - "data/raw/sft_part2_4557.json"
  cache_dir: "data/cache"
  max_seq_len: 4096
  max_diff_lines: 3
  split:
    n_eval_specs: 30
    sft_eval_frac: 0.10
    seed: 42

train:
  loss_mode: "contrastive"   # <— A1: no scalar head, use legacy aggregator
  optimizer: "adamw"
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1
  warmup_frac: 0.03
  cosine_end_frac: 0.10
  epochs: 2                  # <— shorter than run #10's 3
  micro_batch_size: 32
  grad_accum: 1
  precision: "bf16"
  gradient_checkpointing: true

  batch_min_traj_triples: 2
  batch_min_safe_pairs: 4

  loss_weights:
    spec: 1.0                # <— legacy InfoNCE spec loss
    line: 1.0                # <— legacy per-line hinge
  line_loss:
    margin: 1.0

  stop_point:
    min_train_steps_before_check: 200
    loss_plateau_window: 200
    min_eval_auroc_epoch_1: 0.0

  marker_aug_k: 2
  marker_aug_prob: 0.6
  marker_aug_positive_prob: 0.0
  marker_aug_mode: "adversarial"

eval:
  every_n_steps: 500
  probe_batch_size: 32

checkpoint:
  dir: "checkpoints/abl_a1_no_scalar_head"

logging:
  wandb_project: "ebm-verus"
  log_every: 10
  energy_histogram_every: 100
  input_grad_probe_every: 500
