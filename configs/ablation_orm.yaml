# A5 ablation: ORM-style pointwise BCE on whole-impl energy vs PASS/FAIL label.
# Same architecture (sentinel + LSE-aggregated whole-impl energy) -- only the
# loss changes. The energy is treated as a logit; BCE on the binary status.
#
# If this baseline *also* hits whole-impl AUROC ~0.5 on sibling pairs, the
# info-theoretic ceiling argument is empirically supported (Cobbe-style).

model:
  backbone: "Qwen/Qwen2.5-Coder-1.5B"
  sentinel_token: "<|fim_pad|>"
  lora:
    rank: 16
    alpha: 32
    dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
    embed_lora_rank: 8
  head:
    hidden_dim: 256
    dropout: 0.1
    init_std: 0.02
  lse:
    # Flat T per Zhang 2501.07301 "assessment drift" diagnosis. The
    # contrastive-LSE run #7 showed AUROC oscillations as T crossed ~0.5
    # mid-epoch-1; holding T constant prevents calibration drift between
    # train-time and eval-time aggregator semantics.
    temp_start: 0.3
    temp_end: 0.3

data:
  system_trajectory_path: "data/raw/system_trajectory_843.jsonl"
  sft_safe_path: "data/raw/sft_safe_25k.json"
  extra_trajectory_paths:
    - "data/raw/algorithmic_trajectory_9040.jsonl"
  extra_sft_paths:
    - "data/raw/sft_part2_4557.json"
  cache_dir: "data/cache"
  max_seq_len: 4096
  max_diff_lines: 3
  split:
    n_eval_specs: 30
    sft_eval_frac: 0.10
    seed: 42

train:
  optimizer: "adamw"
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1
  warmup_frac: 0.03
  cosine_end_frac: 0.10
  epochs: 3
  micro_batch_size: 16
  grad_accum: 1
  precision: "bf16"
  gradient_checkpointing: true
  batch_min_traj_triples: 2
  batch_min_safe_pairs: 4
  loss_weights:
    spec: 1.0
    line: 1.0
  line_loss:
    margin: 1.0
  loss_mode: "orm"
  bce_pos_weight: 1.0   # roughly balanced classes (corpus ~50/50 PASS/FAIL)
  stop_point:
    min_train_steps_before_check: 200
    loss_plateau_window: 200
    min_eval_auroc_epoch_1: 0.0

eval:
  every_n_steps: 500
  probe_batch_size: 32

checkpoint:
  dir: "checkpoints/orm_run"

logging:
  wandb_project: "ebm-verus"
  log_every: 10
  energy_histogram_every: 100
  input_grad_probe_every: 500
