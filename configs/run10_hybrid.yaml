# Run #10: Alt A+/v2 hybrid EBM.
#
# Architecture (vs run #9):
#   - Same Qwen2.5-Coder-1.5B + LoRA backbone, same per-line head + sentinels.
#   - NEW: scalar_head — attention-pool over [spec; impl] hidden states → 1 scalar.
#     Trained directly on impl-pair hinge for whole-impl energy.
#   - DROPPED: LSE aggregator over per-line energies (caused bias-drift inversion).
#   - DROPPED: within-spec InfoNCE on whole-impl (collapsed in run #9).
#
# Loss (loss_mode=hybrid):
#   L = lambda_scalar    * L_impl_pair_hinge   (impl-level, scalar head)
#     + lambda_listwise  * L_line_listwise     (within-impl softmax CE, ListNet)
#     + lambda_pairwise  * L_line_hinge_semi_hard  (top-k=3 hard-neg mining)
#
# Per-line losses target top-1 (run #9 hit 0.80 top-3 / 0.45 top-1 on real bugs).
# Listwise is primary, hinge with semi-hard mining is secondary regularizer.
#
# Marker handling: keep run #9's adversarial injection (it worked: 33pt leak → 4pt).
# Also keep embed-surgery for paper-completeness (was nullified by LoRA-on-embed
# in run #9 but is still the documented baseline intervention).

model:
  backbone: "Qwen/Qwen2.5-Coder-1.5B"
  sentinel_token: "<|fim_pad|>"
  lora:
    rank: 16
    alpha: 32
    dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
    embed_lora_rank: 8
  head:
    hidden_dim: 256
    dropout: 0.1
    init_std: 0.02
  lse:
    # Unused in hybrid mode (the scalar head replaces LSE aggregation), but
    # kept for compat with code paths that still reference these fields.
    temp_start: 1.0
    temp_end: 0.3

data:
  system_trajectory_path: "data/raw/system_trajectory_843.jsonl"
  sft_safe_path: "data/raw/sft_safe_25k.json"
  extra_trajectory_paths:
    - "data/raw/algorithmic_trajectory_9040.jsonl"
  extra_sft_paths:
    - "data/raw/sft_part2_4557.json"
  cache_dir: "data/cache"
  max_seq_len: 4096
  max_diff_lines: 3
  split:
    n_eval_specs: 30
    sft_eval_frac: 0.10
    seed: 42

train:
  loss_mode: "hybrid"
  optimizer: "adamw"
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1
  warmup_frac: 0.03
  cosine_end_frac: 0.10
  epochs: 3
  # Bumped from 16 → 32 to fit K=2 marker-augmented batches.
  # Run #9 with K=2 had: 2 traj specs × ~6 impls + 4 safe specs × ~4 impls = ~28
  # examples per sampler yield. micro_batch=16 was truncating safe pairs out,
  # giving line=0 on most steps. micro_batch=32 holds the full sample without
  # truncation, restoring the per-line loss signal.
  micro_batch_size: 32
  grad_accum: 1
  precision: "bf16"
  gradient_checkpointing: true

  batch_min_traj_triples: 2
  batch_min_safe_pairs: 4

  # Hybrid loss weights (per Cao 2007 ListNet + Schroff 2015 semi-hard).
  lambda_scalar: 1.0
  lambda_listwise: 1.0
  lambda_pairwise: 0.3
  listwise_label_smoothing: 0.05
  semi_hard_k: 3

  # Legacy weights — unused in hybrid mode but required by TrainConfig dataclass.
  loss_weights:
    spec: 0.0
    line: 0.0
  line_loss:
    margin: 1.0

  stop_point:
    min_train_steps_before_check: 200
    loss_plateau_window: 200
    min_eval_auroc_epoch_1: 0.0

  # Keep run #9's adversarial marker injection (proven to remove leak).
  marker_aug_k: 2
  marker_aug_prob: 0.6
  marker_aug_positive_prob: 0.0
  marker_aug_mode: "adversarial"

eval:
  every_n_steps: 500
  probe_batch_size: 32

checkpoint:
  dir: "checkpoints/run10_hybrid"

logging:
  wandb_project: "ebm-verus"
  log_every: 10
  energy_histogram_every: 100
  input_grad_probe_every: 500
