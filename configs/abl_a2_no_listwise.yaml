# Ablation A2: drop the listwise (ListNet) per-line CE loss.
#
# Tests whether top-1/top-3 gains over run #9 came from ListNet specifically,
# or just from the semi-hard pairwise hinge.
#
# Only knob change vs run10_hybrid.yaml: lambda_listwise: 1.0 → 0.0
# (and bump lambda_pairwise so the per-line gradient magnitude is comparable).

model:
  backbone: "Qwen/Qwen2.5-Coder-1.5B"
  sentinel_token: "<|fim_pad|>"
  lora:
    rank: 16
    alpha: 32
    dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
    embed_lora_rank: 8
  head:
    hidden_dim: 256
    dropout: 0.1
    init_std: 0.02
  lse:
    temp_start: 1.0
    temp_end: 0.3

data:
  system_trajectory_path: "data/raw/system_trajectory_843.jsonl"
  sft_safe_path: "data/raw/sft_safe_25k.json"
  extra_trajectory_paths:
    - "data/raw/algorithmic_trajectory_9040.jsonl"
  extra_sft_paths:
    - "data/raw/sft_part2_4557.json"
  cache_dir: "data/cache"
  max_seq_len: 4096
  max_diff_lines: 3
  split:
    n_eval_specs: 30
    sft_eval_frac: 0.10
    seed: 42

train:
  loss_mode: "hybrid"
  optimizer: "adamw"
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1
  warmup_frac: 0.03
  cosine_end_frac: 0.10
  epochs: 1                  # <- retry: 1 epoch sufficient for ablation signal
  micro_batch_size: 32
  grad_accum: 1
  precision: "bf16"
  gradient_checkpointing: true   # H100 80GB needs checkpointing at micro_batch=32 seq=4k

  batch_min_traj_triples: 2
  batch_min_safe_pairs: 4

  lambda_scalar: 1.0
  lambda_listwise: 0.0       # <— A2: drop ListNet
  lambda_pairwise: 1.0       # <— compensate so per-line still gets gradient
  listwise_label_smoothing: 0.05
  semi_hard_k: 3

  loss_weights:
    spec: 0.0
    line: 0.0
  line_loss:
    margin: 1.0

  stop_point:
    min_train_steps_before_check: 200
    loss_plateau_window: 200
    min_eval_auroc_epoch_1: 0.0

  marker_aug_k: 2
  marker_aug_prob: 0.6
  marker_aug_positive_prob: 0.0
  marker_aug_mode: "adversarial"

eval:
  every_n_steps: 500
  probe_batch_size: 32

checkpoint:
  dir: "checkpoints/abl_a2_no_listwise"

logging:
  wandb_project: "ebm-verus"
  log_every: 10
  energy_histogram_every: 100
  input_grad_probe_every: 500
