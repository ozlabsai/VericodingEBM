# Default training config for energy-localized vericoding.
# Override per-run with CLI flags or a sibling YAML.

model:
  backbone: "Qwen/Qwen2.5-Coder-1.5B"
  # Sentinel: reuse Qwen's reserved <|fim_pad|>. Decision rationale:
  # - never appears in normal training, so its embedding is effectively a free param LoRA can adapt
  # - no embedding-matrix resize, so LoRA-only fine-tuning Just Works
  # - distinct token id under the existing tokenizer (no special_tokens injection)
  sentinel_token: "<|fim_pad|>"

  lora:
    # All-linear LoRA targets (q,k,v,o + MLP) — domain shift to Verus needs MLP adaptation
    # (per critique 2c). Embed_tokens at lower rank for lexical adaptation.
    rank: 16
    alpha: 32
    dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
    # Adapt the embedding layer at lower rank — Verus keywords have different semantic
    # role than vanilla Rust; cheapest place to fix that is at the lexical layer.
    embed_lora_rank: 8

  head:
    hidden_dim: 256
    dropout: 0.1
    init_std: 0.02

  lse:
    # Run #6 (Option A): sharpen LSE — 1.0 -> 0.3 (was 2.0 -> 0.7).
    # Diagnosis from run #5 step=1000 eval: top-3 recall climbed to 0.933 but
    # AUROC inverted to 0.40, meaning per-line localization is working but
    # the LSE aggregator (at T~1.85 early) is over-smoothing — the mean of
    # ~30 low non-buggy energies dominates the 1-2 high buggy line energies,
    # so whole-impl energy doesn't track buggyness. Sharper T pushes LSE
    # toward max-over-lines, which is the right structural semantics for
    # "impl is bad iff some line is bad".
    temp_start: 1.0
    temp_end: 0.3

data:
  system_trajectory_path: "data/raw/system_trajectory_843.jsonl"
  sft_safe_path: "data/raw/sft_safe_25k.json"
  # Additional sources discovered via the README audit. algorithmic_trajectory
  # is a same-shape sibling of system_trajectory (~11x more data, 279 mixed-
  # label specs). sft_part2 is a same-shape SFT sibling with 1,915 unique specs
  # (vs sft_safe_25k's 36 dominant specs after a parser bug was masking them).
  extra_trajectory_paths:
    - "data/raw/algorithmic_trajectory_9040.jsonl"
  extra_sft_paths:
    - "data/raw/sft_part2_4557.json"
  cache_dir: "data/cache"

  max_seq_len: 4096
  # Drop sft_safe pairs where broken/fixed diff spans more than this many lines (whole-fn rewrites).
  max_diff_lines: 3

  split:
    n_eval_specs: 30          # of 281 system_trajectory specs
    sft_eval_frac: 0.10       # hash-based split on spec text
    seed: 42

train:
  optimizer: "adamw"
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1
  warmup_frac: 0.03
  cosine_end_frac: 0.10       # cosine decays to 10% of peak lr
  epochs: 3
  # Direct effective batch (no grad-accum). Reason: with grad_accum > 1, the
  # collator runs PER MICRO-BATCH, and within-spec contrastive triples can be
  # split across micro-batches — the collator's traj_triples list comes up
  # empty in such micro-batches, killing L_spec. micro_batch=16 + accum=1
  # keeps the whole contrastive group in one forward pass. A100 80GB has
  # plenty of headroom for 1.5B + LoRA + bf16 at micro_batch=16 ctx 4k.
  micro_batch_size: 16
  grad_accum: 1
  precision: "bf16"
  gradient_checkpointing: true

  # Per-batch composition (in-batch negative pooling):
  # at least N system-trajectory triples + M sft-safe pairs.
  # Enforced by the sampler (per critique #4).
  batch_min_traj_triples: 2
  batch_min_safe_pairs: 4

  loss_weights:
    # Run #6: bump spec to 3.0. L_line has saturated (top-3=0.93 at step 1000)
    # while AUROC needs L_spec to do more shaping work post-aggregator-sharpen.
    spec: 3.0     # within-spec InfoNCE on system_trajectory triples
    line: 1.0     # pairwise hinge on sft_safe diffs

  line_loss:
    margin: 1.0

  # Friday-midnight stop-point triggers (per critique #8).
  stop_point:
    min_train_steps_before_check: 200
    loss_plateau_window: 200
    min_eval_auroc_epoch_1: 0.0

eval:
  every_n_steps: 500
  probe_batch_size: 32       # held-out batch for per-N-step energy histogram + grad-norm probe

checkpoint:
  # Saves LoRA adapter + head weights to {dir}/latest at every eval and {dir}/final
  # at training end. Frozen backbone is reconstructed from cfg.model.backbone.
  # Set to null to disable.
  dir: "checkpoints/run7_resume"

logging:
  wandb_project: "ebm-verus"
  log_every: 10
  energy_histogram_every: 100
  input_grad_probe_every: 500
