# E7 ablation: same backbone + sentinel head architecture, but trained with
# pointwise BCE on per-sentinel buggy/not-buggy labels instead of contrastive
# (L_spec + L_line). If our contrastive run >> this BCE run on top-3, the EBM
# framing (specifically: contrastive ranking objective + LSE decomposition) is
# doing real work and not just "supervise per-line then localize".

# Inherits all defaults from default.yaml -- only override what changes.
# (We just duplicate it here since we don't have a YAML !include; keep diffs minimal.)

model:
  backbone: "Qwen/Qwen2.5-Coder-1.5B"
  sentinel_token: "<|fim_pad|>"
  lora:
    rank: 16
    alpha: 32
    dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
    embed_lora_rank: 8
  head:
    hidden_dim: 256
    dropout: 0.1
    init_std: 0.02
  lse:
    # LSE temperature is irrelevant for BCE (whole-impl energy not used in loss),
    # but eval still reports AUROC at this T. Keep matched to contrastive run for fairness.
    temp_start: 1.0
    temp_end: 0.3

data:
  system_trajectory_path: "data/raw/system_trajectory_843.jsonl"
  sft_safe_path: "data/raw/sft_safe_25k.json"
  extra_trajectory_paths:
    - "data/raw/algorithmic_trajectory_9040.jsonl"
  extra_sft_paths:
    - "data/raw/sft_part2_4557.json"
  cache_dir: "data/cache"
  max_seq_len: 4096
  max_diff_lines: 3
  split:
    n_eval_specs: 30
    sft_eval_frac: 0.10
    seed: 42

train:
  optimizer: "adamw"
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1
  warmup_frac: 0.03
  cosine_end_frac: 0.10
  epochs: 3
  micro_batch_size: 16
  grad_accum: 1
  precision: "bf16"
  gradient_checkpointing: true
  batch_min_traj_triples: 2
  batch_min_safe_pairs: 4
  loss_weights:
    spec: 1.0   # unused in bce mode but parsed
    line: 1.0
  line_loss:
    margin: 1.0
  # *** the ablation switch ***
  loss_mode: "bce"
  bce_pos_weight: 10.0  # 1-3 buggy lines per ~30, so positive class ~10x rarer
  stop_point:
    min_train_steps_before_check: 200
    loss_plateau_window: 200
    min_eval_auroc_epoch_1: 0.0   # disable -- BCE may legitimately not optimize AUROC

eval:
  every_n_steps: 500
  probe_batch_size: 32

checkpoint:
  dir: "checkpoints/bce_run"

logging:
  wandb_project: "ebm-verus"
  log_every: 10
  energy_histogram_every: 100
  input_grad_probe_every: 500
