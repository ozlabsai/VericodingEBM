name: Deploy demo to GitHub Pages

# Builds demo/frontend/ with VITE_BASE=/VericodingEBM/ and publishes the
# resulting dist/ to GitHub Pages. The 404.html copy is the classic SPA
# fallback: GitHub Pages serves it for any unknown path, our JS reads
# window.location.pathname and renders the right component.
#
# Note: this workflow only uses fixed environment variables we control, never
# untrusted event payloads (issue titles, PR descriptions, commit messages).

on:
  push:
    branches: [main]
    paths:
      - 'demo/frontend/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: demo/frontend/package-lock.json

      - name: Install
        working-directory: demo/frontend
        run: npm ci

      - name: Build (project-page base)
        working-directory: demo/frontend
        env:
          VITE_BASE: /VericodingEBM/
        run: npm run build

      - name: SPA fallback (copy index.html to 404.html)
        run: cp demo/frontend/dist/index.html demo/frontend/dist/404.html

      - name: Disable Jekyll (preserve underscore-prefixed paths)
        run: touch demo/frontend/dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
